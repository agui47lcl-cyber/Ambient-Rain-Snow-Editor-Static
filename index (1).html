<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ambient Rain & Snow Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@19",
        "react-dom": "https://esm.sh/react-dom@19",
        "react-dom/client": "https://esm.sh/react-dom@19/client",
        "motion/react": "https://esm.sh/motion@12/react",
        "lucide-react": "https://esm.sh/lucide-react",
        "clsx": "https://esm.sh/clsx",
        "tailwind-merge": "https://esm.sh/tailwind-merge"
      }
    }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;700&family=JetBrains+Mono:wght@400;500&family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: white;
            overflow: hidden;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;

        input[type="range"] {
            -webkit-appearance: none;

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;

        }
        input[type="range"]::-webkit-slider-runnable-track {

            cursor: pointer;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;

    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module">
        import React, { useState, useRef, useEffect, useCallback, memo, useLayoutEffect, createElement, useMemo } from 'https://esm.sh/react@19';
        import { createRoot } from 'https://esm.sh/react-dom@19/client';
        import { motion, AnimatePresence } from 'https://esm.sh/motion@12/react';
        import { 
          Settings, Upload, Save, Trash2, X, Maximize2, Minimize2, Type, Sliders, 
          ChevronDown, Volume2, VolumeX, ChevronLeft, ChevronRight, Plus, 
          GripHorizontal, Pencil, Zap, CloudRain, CloudSnow, Music, History, Clock
        } from 'https://esm.sh/lucide-react';
        import { clsx } from 'https://esm.sh/clsx';
        import { twMerge } from 'https://esm.sh/tailwind-merge';

        function cn(...inputs) {
          return twMerge(clsx(inputs));
        }

        // --- Audio Engine ---
        class AudioEngine {
          constructor(rainUrl, snowUrl) {
            this.rainUrl = rainUrl;
            this.snowUrl = snowUrl;
            this.context = null;
            this.rainAudio = null;
            this.snowAudio = null;
            this.rainGain = null;
            this.snowGain = null;
            this.bgmAudio = null;
            this.bgmGain = null;
            this.masterGain = null;
            this.initialized = false;
            this.currentMode = 'rain';
            this.targetVolume = 0.5;
            this.bgmVolume = 0.5;
            this.isMuted = false;
            this.isBgmEnabled = false;
            this.playPromise = null;
          }

          async init() {
            if (this.initialized) return;
            try {
              this.context = new (window.AudioContext || window.webkitAudioContext)();
              const createAudio = (url) => {
                const audio = new Audio(url);
                audio.loop = true;
                audio.preload = "auto";
                audio.addEventListener('error', (e) => {
                  console.error("Audio error detected:", audio.error?.message || "Unknown error", e);
                  setTimeout(() => {
                    if (audio.src && audio.src !== window.location.href) {
                      audio.load();
                      if (this.initialized && !this.isMuted) audio.play().catch(() => {});
                    }
                  }, 5000);
                });
                audio.addEventListener('stalled', () => {
                  audio.load();
                  audio.play().catch(() => {});
                });
                return audio;
              };
              this.rainAudio = createAudio(this.rainUrl);
              this.snowAudio = createAudio(this.snowUrl);
              this.bgmAudio = createAudio();
              const rainSource = this.context.createMediaElementSource(this.rainAudio);
              const snowSource = this.context.createMediaElementSource(this.snowAudio);
              const bgmSource = this.context.createMediaElementSource(this.bgmAudio);
              this.rainGain = this.context.createGain();
              this.snowGain = this.context.createGain();
              this.bgmGain = this.context.createGain();
              this.masterGain = this.context.createGain();
              rainSource.connect(this.rainGain);
              snowSource.connect(this.snowGain);
              bgmSource.connect(this.bgmGain);
              this.rainGain.connect(this.masterGain);
              this.snowGain.connect(this.masterGain);
              this.bgmGain.connect(this.masterGain);
              this.masterGain.connect(this.context.destination);
              this.updateVolumes(0);
              this.initialized = true;
            } catch (error) {
              console.error("Failed to initialize AudioEngine:", error);
            }
          }

          async play() {
            if (!this.initialized) await this.init();
            if (!this.context) return;
            if (this.context.state === 'suspended') await this.context.resume();
            const playAudio = async (audio) => {
              if (!audio || !audio.src || audio.src === window.location.href) return;
              try {
                if (!audio.paused) return;
                if (audio.readyState < 3) {
                  await new Promise((resolve) => {
                    const onCanPlay = () => { audio.removeEventListener('canplay', onCanPlay); resolve(); };
                    const onError = () => { audio.removeEventListener('error', onError); resolve(); };
                    audio.addEventListener('canplay', onCanPlay);
                    audio.addEventListener('error', onError);
                    setTimeout(resolve, 5000);
                  });
                }
                if (audio.paused && audio.src && audio.src !== window.location.href) await audio.play();
              } catch (error) { if (error.name !== 'AbortError') console.warn("Playback failed:", error); }
            };
            if (this.playPromise) await this.playPromise;
            this.playPromise = (async () => {
              try {
                const playPromises = [playAudio(this.rainAudio), playAudio(this.snowAudio)];
                if (this.isBgmEnabled && this.bgmAudio?.src && this.bgmAudio.src !== window.location.href) playPromises.push(playAudio(this.bgmAudio));
                await Promise.all(playPromises);
              } finally { this.playPromise = null; }
            })();
            await this.playPromise;
          }

          pause() {
            this.rainAudio?.pause();
            this.snowAudio?.pause();
            this.bgmAudio?.pause();
          }

          setBgmUrl(url) {
            if (!this.bgmAudio || !url) return;
            const absoluteUrl = new URL(url, window.location.href).href;
            if (this.bgmAudio.src === absoluteUrl) return;
            this.bgmAudio.pause();
            this.bgmAudio.src = absoluteUrl;
            if (this.isBgmEnabled && this.initialized) {
              const onCanPlay = () => {
                this.bgmAudio?.removeEventListener('canplay', onCanPlay);
                this.bgmAudio?.play().catch(() => {});
              };
              this.bgmAudio.addEventListener('canplay', onCanPlay);
              this.bgmAudio.load();
            }
          }

          setBgmEnabled(enabled) {
            this.isBgmEnabled = enabled;
            if (enabled && this.initialized && this.bgmAudio?.src) this.bgmAudio.play().catch(() => {});
            else if (!enabled) this.bgmAudio?.pause();
            this.updateVolumes(0.1);
          }

          setVolume(volume) { this.targetVolume = volume; this.updateVolumes(0.1); }
          setBgmVolume(volume) { this.bgmVolume = volume; this.updateVolumes(0.1); }
          setMuted(muted) { this.isMuted = muted; this.updateVolumes(0.1); }
          setMode(mode) {
            if (this.currentMode === mode) return;
            this.currentMode = mode;
            this.updateVolumes(0.5);
          }

          updateVolumes(fadeTime) {
            if (!this.context || !this.rainGain || !this.snowGain || !this.bgmGain || !this.masterGain) return;
            const now = this.context.currentTime;
            const masterVol = this.isMuted ? 0 : this.targetVolume;
            this.masterGain.gain.linearRampToValueAtTime(masterVol, now + fadeTime);
            const rainTarget = this.currentMode === 'rain' ? 1 : 0;
            const snowTarget = this.currentMode === 'snow' ? 1 : 0;
            this.rainGain.gain.linearRampToValueAtTime(rainTarget, now + fadeTime);
            this.snowGain.gain.linearRampToValueAtTime(snowTarget, now + fadeTime);
            const bgmTarget = this.isBgmEnabled ? this.bgmVolume : 0;
            this.bgmGain.gain.linearRampToValueAtTime(bgmTarget, now + fadeTime);
          }

          getIsPlaying() {
            const ambientPlaying = !!(this.rainAudio && !this.rainAudio.paused) || !!(this.snowAudio && !this.snowAudio.paused);
            const bgmPlaying = !!(this.bgmAudio && !this.bgmAudio.paused);
            return ambientPlaying || bgmPlaying;
          }
        }

        // --- Rain Shader ---
        const RainShader = ({
          mode,
          raininess,
          fog,
          refraction,
          speed,
          size,
          bgRotation,
          bgScale,
          bgContrast,
          bgBrightness,
          backgroundType,
          backgroundUrl,
        }) => {
          const canvasRef = useRef(null);
          const videoRef = useRef(null);
          const textureRef = useRef(null);
          const programRef = useRef(null);
          const glRef = useRef(null);
          const uniformsRef = useRef({});

          const propsRef = useRef({
            mode, raininess, fog, refraction, speed, size, bgRotation, bgScale, bgContrast, bgBrightness, backgroundType, backgroundUrl
          });

          useEffect(() => {
            propsRef.current = {
              mode, raininess, fog, refraction, speed, size, bgRotation, bgScale, bgContrast, bgBrightness, backgroundType, backgroundUrl
            };
          }, [mode, raininess, fog, refraction, speed, size, bgRotation, bgScale, bgContrast, bgBrightness, backgroundType, backgroundUrl]);

          useEffect(() => {
            if (backgroundType === 'video' && backgroundUrl) {
              const video = document.createElement('video');
              video.src = backgroundUrl;
              video.loop = true;
              video.muted = true;
              video.play();
              videoRef.current = video;
            } else {
              videoRef.current = null;
            }
          }, [backgroundType, backgroundUrl]);

          useEffect(() => {
            const canvas = canvasRef.current;
            if (!canvas) return;

            const gl = canvas.getContext('webgl', { antialias: false, depth: false, stencil: false });
            if (!gl) return;
            glRef.current = gl;

            const vertexShaderSource = `
              attribute vec2 position;
              void main() {
                gl_Position = vec4(position, 0.0, 1.0);
              }
            `;

            const fragmentShaderSource = `
              precision highp float;
              uniform vec3 iResolution;
              uniform float iTime;
              uniform vec4 iMouse;
              uniform sampler2D iChannel0;
              uniform int iBgType;
              uniform int iMode;
              
              uniform float iRaininess;
              uniform float iFog;
              uniform float iRefraction;
              uniform float iSpeed;
              uniform float iSize;
              uniform float iBgRotation;
              uniform float iBgScale;
              uniform float iBgContrast;
              uniform float iBgBrightness;

              #define S(a, b, t) smoothstep(a, b, t)
              #define USE_POST_PROCESSING
              #define SNOWRATE 200.0
              #define PI 3.14159
              #define HALFPI 1.570796

              vec2 mod289(vec2 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
              vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
              vec4 mod289(vec4 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
              vec3 permute(vec3 x) { return mod289(((x*34.0)+1.0)*x); }
              vec4 permute(vec4 x) { return mod((34.0 * x + 1.0) * x, 289.0); }
              vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }

              float snoise(vec2 v) {
                const vec4 C = vec4(0.211324865405187,0.366025403784439,-0.577350269189626,0.024390243902439);
                vec2 i  = floor(v + dot(v, C.yy) );
                vec2 x0 = v -   i + dot(i, C.xx);
                vec2 i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);
                vec4 x12 = x0.xyxy + C.xxzz;
                x12.xy -= i1;
                i = mod289(i);
                vec3 p = permute( permute( i.y + vec3(0.0, i1.y, 1.0 )) + i.x + vec3(0.0, i1.x, 1.0 ));
                vec3 m = max(0.5 - vec3(dot(x0,x0), dot(x12.xy,x12.xy), dot(x12.zw,x12.zw)), 0.0);
                m = m*m; m = m*m;
                vec3 x = 2.0 * fract(p * C.www) - 1.0;
                vec3 h = abs(x) - 0.5;
                vec3 ox = floor(x + 0.5);
                vec3 a0 = x - ox;
                m *= 1.79284291400159 - 0.85373472095314 * ( a0*a0 + h*h );
                vec3 g;
                g.x  = a0.x  * x0.x  + h.x  * x0.y;
                g.yz = a0.yz * x12.xz + h.yz * x12.yw;
                return 130.0 * dot(m, g);		
              }

              float cellular2x2(vec2 P) {
                #define K 0.142857142857
                #define K2 0.0714285714285
                #define jitter 0.8
                vec2 Pi = mod(floor(P), 289.0);
                vec2 Pf = fract(P);
                vec4 Pfx = Pf.x + vec4(-0.5, -1.5, -0.5, -1.5);
                vec4 Pfy = Pf.y + vec4(-0.5, -0.5, -1.5, -1.5);
                vec4 p = permute(Pi.x + vec4(0.0, 1.0, 0.0, 1.0));
                p = permute(p + Pi.y + vec4(0.0, 0.0, 1.0, 1.0));
                vec4 ox = mod(p, 7.0)*K+K2;
                vec4 oy = mod(floor(p*K),7.0)*K+K2;
                vec4 dx = Pfx + jitter*ox;
                vec4 dy = Pfy + jitter*oy;
                vec4 d = dx * dx + dy * dy;
                d.xy = min(d.xy, d.zw);
                d.x = min(d.x, d.y);
                return d.x;
              }

              float fbm(vec2 p) {
                float f = 0.0; float w = 0.5;
                for (int i = 0; i < 5; i ++) {
                  f += w * snoise(p);
                  p *= 2.; w *= 0.5;
                }
                return f;
              }

              vec3 N13(float p) {
                 vec3 p3 = fract(vec3(p) * vec3(.1031,.11369,.13787));
                 p3 += dot(p3, p3.yzx + 19.19);
                 return fract(vec3((p3.x + p3.y)*p3.z, (p3.x+p3.z)*p3.y, (p3.y+p3.z)*p3.x));
              }

              vec4 N14(float t) { return fract(sin(t*vec4(123., 1024., 1456., 264.))*vec4(6547., 345., 8799., 1564.)); }
              float N(float t) { return fract(sin(t*12345.564)*7658.76); }
              float Saw(float b, float t) { return S(0., b, t)*S(1., b, t); }

              vec2 DropLayer2(vec2 uv, float t, float iSize) {
                  vec2 UV = uv;
                  uv.y += t*0.75;
                  vec2 a = vec2(6., 1.);
                  vec2 grid = a*2.;
                  vec2 id = floor(uv*grid);
                  float colShift = N(id.x); 
                  uv.y += colShift;
                  id = floor(uv*grid);
                  vec3 n = N13(id.x*35.2+id.y*2376.1);
                  vec2 st = fract(uv*grid)-vec2(.5, 0);
                  float x = n.x-.5;
                  float y = UV.y*20. * iSize;
                  float wiggle = sin(y+sin(y));
                  x += wiggle*(.5-abs(x))*(n.z-.5);
                  x *= .7;
                  float ti = fract(t+n.z);
                  y = (Saw(.85, ti)-.5)*.9+.5;
                  vec2 p = vec2(x, y);
                  float d = length((st-p)*a.yx);
                  float mainDrop = S(.4, .0, d);
                  float r = sqrt(S(1., y, st.y));
                  float cd = abs(st.x-x);
                  float trail = S(.23*r, .15*r*r, cd);
                  float trailFront = S(-.02, .02, st.y-y);
                  trail *= trailFront*r*r;
                  y = UV.y;
                  float trail2 = S(.2*r, .0, cd);
                  float droplets = max(0., (sin(y*(1.-y)*120.)-st.y))*trail2*trailFront*n.z;
                  y = fract(y*10.)+(st.y-.5);
                  float dd = length(st-vec2(x, y));
                  droplets = S(.3, 0., dd);
                  return vec2(mainDrop+droplets*r*trailFront, trail);
              }

              float StaticDrops(vec2 uv, float t) {
                uv *= 40.;
                vec2 id = floor(uv);
                uv = fract(uv)-.5;
                vec3 n = N13(id.x*107.45+id.y*3543.654);
                vec2 p = (n.xy-.5)*.7;
                float d = length(uv-p);
                float fade = Saw(.025, fract(t+n.z));
                return S(.3, 0., d)*fract(n.z*10.)*fade;
              }

              vec2 Drops(vec2 uv, float t, float l0, float l1, float l2, float iSize) {
                  float s = StaticDrops(uv, t)*l0; 
                  vec2 m1 = DropLayer2(uv, t, iSize)*l1;
                  vec2 m2 = DropLayer2(uv*1.85, t, iSize)*l2;
                  float c = s+m1.x+m2.x;
                  c = S(.3, 1., c);
                  return vec2(c, max(m1.y*l0, m2.y*l1));
              }

              vec2 Rotate(vec2 v, float a) {
                float s = sin(a); float c = cos(a);
                return vec2(v.x * c - v.y * s, v.x * s + v.y * c);
              }

              void main() {
                vec2 fragCoord = gl_FragCoord.xy;
                vec2 uv = (fragCoord.xy-.5*iResolution.xy) / iResolution.y;
                vec2 UV = fragCoord.xy/iResolution.xy;
                float T = iTime;
                vec3 col;
                if (iMode == 0) {
                  float rainAmount = iRaininess;
                  float t = T * 0.2 * iSpeed;
                  float maxBlur = mix(3., 6., rainAmount) * iFog * 2.0;
                  float minBlur = 2. * iFog;
                  vec2 dropsUv = (UV-.5)*(.9+1.0*.1)+.5;
                  float staticDrops = S(-.5, 1., rainAmount)*2.;
                  float layer1 = S(.25, .75, rainAmount);
                  float layer2 = S(.0, .5, rainAmount);
                  vec2 c = Drops(uv, t, staticDrops, layer1, layer2, iSize);
                  vec2 e = vec2(.001, 0.);
                  float cx = Drops(uv+e, t, staticDrops, layer1, layer2, iSize).x;
                  float cy = Drops(uv+e.yx, t, staticDrops, layer1, layer2, iSize).x;
                  vec2 n = vec2(cx-c.x, cy-c.x);
                  vec2 bgUv = UV + n * iRefraction;
                  bgUv = (bgUv - 0.5) / max(iBgScale, 0.001) + 0.5;
                  bgUv = Rotate(bgUv - 0.5, iBgRotation * 3.14159 / 180.0) + 0.5;
                  if (iBgType == 0) {
                    col = mix(vec3(0.05, 0.1, 0.2), vec3(0.3, 0.1, 0.4), bgUv.y + sin(iTime * 0.2) * 0.3);
                    col += sin(bgUv.x * 8. + iTime * 0.5) * 0.05;
                  } else { col = texture2D(iChannel0, bgUv).rgb; }
                  col = (col - 0.5) * iBgContrast + 0.5;
                  col *= iBgBrightness;
                } else {
                  // New Snow Shader Logic
                  #define SNOW_LAYERS 50
                  #define SNOW_DEPTH .5
                  #define SNOW_WIDTH .3
                  #define SNOW_SPEED (.6 * iSpeed)
                  
                  const mat3 p = mat3(13.323122,23.5112,21.71123,21.1212,28.7312,11.9312,21.8112,14.7212,61.3934);
                  vec2 uv_snow = iMouse.xy/iResolution.xy + vec2(1.,iResolution.y/iResolution.x)*fragCoord.xy / iResolution.xy;
                  vec3 acc = vec3(0.0);
                  float dof = 5.*sin(iTime*.1);
                  for (int i=0;i<SNOW_LAYERS;i++) {
                    float fi = float(i);
                    vec2 q = uv_snow*(1.+fi*SNOW_DEPTH);
                    q += vec2(q.y*(SNOW_WIDTH*mod(fi*7.238917,1.)-SNOW_WIDTH*.5),SNOW_SPEED*iTime/(1.+fi*SNOW_DEPTH*.03));
                    vec3 n = vec3(floor(q),31.189+fi);
                    vec3 m = floor(n)*.00001 + fract(n);
                    vec3 mp = (31415.9+m)/fract(p*m);
                    vec3 r = fract(mp);
                    vec2 s = abs(mod(q,1.)-.5+.9*r.xy-.45);
                    s += .01*abs(2.*fract(10.*q.yx)-1.); 
                    float d = .6*max(s.x-s.y,s.x+s.y)+max(s.x,s.y)-.01;
                    float edge = .005+.05*min(.5*abs(fi-5.-dof),1.);
                    acc += vec3(smoothstep(edge,-edge,d)*(r.x/(1.+.02*fi*SNOW_DEPTH)));
                  }
                  float flakes = acc.r * iRaininess * 2.0;
                  
                  if (iBgType == 0) {
                    vec2 bgUv = UV;
                    bgUv = (bgUv - 0.5) / max(iBgScale, 0.001) + 0.5;
                    bgUv = Rotate(bgUv - 0.5, iBgRotation * 3.14159 / 180.0) + 0.5;
                    col = mix(vec3(0.05, 0.1, 0.2), vec3(0.3, 0.1, 0.4), bgUv.y + sin(iTime * 0.2) * 0.3);
                    col += sin(bgUv.x * 8. + iTime * 0.5) * 0.05;
                    col += vec3(flakes * 0.9, flakes, flakes * 1.1);
                  } else {
                    vec2 bgUv = UV;
                    bgUv = (bgUv - 0.5) / max(iBgScale, 0.001) + 0.5;
                    bgUv = Rotate(bgUv - 0.5, iBgRotation * 3.14159 / 180.0) + 0.5;
                    vec3 background = texture2D(iChannel0, bgUv).rgb;
                    background = (background - 0.5) * iBgContrast + 0.5;
                    background *= iBgBrightness;
                    col = background + vec3(flakes * 0.9, flakes, flakes * 1.1);
                  }
                }
                #ifdef USE_POST_PROCESSING
                float t_post = (T+3.)*.5;
                float colFade = sin(t_post*.2)*.5+.5;
                col *= mix(vec3(1.), vec3(.8, .9, 1.3), colFade);
                col *= 1.-dot(UV-0.5, UV-0.5);
                col *= S(0., 10., T);
                #endif
                gl_FragColor = vec4(col, 1.);
              }
            `;

            const createShader = (type, source) => {
              const shader = gl.createShader(type);
              gl.shaderSource(shader, source);
              gl.compileShader(shader);
              if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
                console.error(gl.getShaderInfoLog(shader));
                gl.deleteShader(shader);
                return null;
              }
              return shader;
            };

            const vs = createShader(gl.VERTEX_SHADER, vertexShaderSource);
            const fs = createShader(gl.FRAGMENT_SHADER, fragmentShaderSource);
            const program = gl.createProgram();
            if (!program || !vs || !fs) return;
            gl.attachShader(program, vs);
            gl.attachShader(program, fs);
            gl.linkProgram(program);
            gl.useProgram(program);
            programRef.current = program;

                    createElement(ControlSlider, { label: "折射率", value: refraction, onChange: throttledSetRefraction }),
                    createElement(ControlSlider, { label: "速度", value: speed, onChange: throttledSetSpeed }),
                    createElement(ControlSlider, { label: mode === 'rain' ? "雨滴大小" : "雪花大小", value: size, onChange: throttledSetSize, min: 0.1, max: 3.0 }),
                    createElement(ControlSlider, { label: "背景旋转", value: bgRotation, onChange: throttledSetBgRotation, min: 0, max: 360 }),
                    createElement(ControlSlider, { label: "背景缩放", value: bgScale, onChange: throttledSetBgScale, min: 0.5, max: 3.0 }),
                    createElement(ControlSlider, { label: "背景对比度", value: bgContrast, onChange: throttledSetBgContrast, min: 0, max: 2.0 }),
                    createElement(ControlSlider, { label: "背景亮度", value: bgBrightness, onChange: throttledSetBgBrightness, min: 0, max: 2.0 }),
                    createElement(ControlSlider, { label: "输入框模糊", value: inputBlur, onChange: setInputBlur, min: 0, max: 64 }),
                    createElement('div', { className: "pt-4 border-t border-white/10" },
                      bgType !== 'fluid' && createElement('button', { onClick: () => { setBgType('fluid'); setBgUrl(undefined); }, className: "w-full mt-2 text-xs text-white/40 hover:text-white transition-colors" }, "重置为流体")
                    )
                  )
                ),
                createElement(motion.button, {
                  whileHover: { scale: 1.1 }, whileTap: { scale: 0.9 }, onClick: () => { setIsPanelOpen(!isPanelOpen); setIsHistoryOpen(false); },
                  className: cn("w-14 h-14 rounded-full flex items-center justify-center transition-all duration-300 shadow-2xl border bg-white/10 backdrop-blur-2xl text-white border-white/20 hover:bg-white/20")
                }, isPanelOpen ? createElement(Minimize2, { size: 24 }) : createElement(Sliders, { size: 24 }))
              )
            );
          }

        // --- Main Entry Point ---
        const root = createRoot(document.getElementById('root'));
        root.render(createElement(App));

    </script>
</body>
</html>
